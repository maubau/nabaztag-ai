name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e "brain[dev]"
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Unit tests (mock-OJN, no hardware)
        run: pytest -v
      - name: Wake-word script online check (generator API still present)
        # The offline install-smoke (pins, --no-deps, ONNX-only, config
        # completeness) runs above with the rest; this extra step verifies the
        # pinned generator commit still ships generate_samples.py. It skips
        # itself on any network blip, so it can't flake the build red.
        env:
          WAKE_ONLINE_CHECK: "1"
        run: pytest -v tests/test_train_wake_word.py -k generator_commit_ships

  audio-install-smoke:
    # Mirrors the Bolt (Ubuntu 24.04 / Python 3.12) and exercises optional-dep
    # resolution, which the mock unit tests never touch: openwakeword's Linux
    # tflite-runtime dep has no cp312 wheel, so the install must go through
    # brain/scripts/install-audio.sh (ONNX-only path).
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: PortAudio shared library (sounddevice runtime dep)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libportaudio2
      - name: Install audio extra + import smoke
        run: brain/scripts/install-audio.sh
