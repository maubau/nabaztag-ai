# Copy to config.yaml (gitignored) and fill in for your setup.

# STT profile: "cloud" (Deepgram primary, OpenAI Whisper API fallback) or "local" (faster-whisper on CPU)
stt_profile: cloud

deepgram:
  # Pinned but swappable without code changes (docs/ARCHITECTURE.md §6.2.4)
  model: nova-3
  # "multi" = automatic it/en code-switching, the desired bilingual behavior
  # (a phrase transcribed as English was in fact spoken in English). Optional
  # fixed profiles: set language to "it" or "en" per session if you ever want
  # to force one. Deepgram recommends endpointing 100 ms for nova-3 multilingual
  # code-switching.
  language: multi
  endpointing: 100

openai_whisper:
  model: whisper-1

local_whisper:
  # benchmark small vs medium int8 on the Bolt (task T5)
  model: small
  compute_type: int8

# TTS profile (informational — the runtime reads TTS_PROFILE from .env):
# "deepgram" (Aura, voice routed by the STT-detected it/en language),
# "elevenlabs" (one multilingual voice) or "piper" (local).
tts_profile: deepgram

deepgram_tts:
  # voices per utterance language (env: DEEPGRAM_TTS_VOICE_IT/_EN)
  voice_it: aura-2-livia-it
  voice_en: aura-2-thalia-en

elevenlabs:
  voice_id: ""      # your Italian voice id
  model: eleven_multilingual_v2

llm:
  # OpenAI is the active provider (§6.2.5). The interface (LLMProvider) stays
  # swappable so other providers can be added later; none is required now.
  # The model is configuration, never hardcoded.
  provider: openai
  # gpt-5.4-mini: real A/B (July 2026, brain/scripts/llm-bench.py) ruled out
  # gpt-5.4-nano for this agent/tool loop — median final-text 3.5-5.5s vs
  # mini's 2.2-3.1s, and it needed extra tool rounds more often, despite
  # being marketed as the fast option for simple tasks.
  model: gpt-5.4-mini
  # none|low|medium|high (reasoning models). "none" is the current candidate
  # (median final-text 2248ms vs low's 3129ms in the same benchmark) — still
  # provisional, the none-vs-low comparison needs re-running now that the
  # redundant tool round-trip is gone (see the `express` tool below).
  reasoning_effort: none
  # Replies are spoken — keep them short. Also a latency lever: 150 tokens is
  # still ample for the ONE short sentence the prompt asks for now, and caps
  # the tail case (a reasoning model can otherwise burn the budget on hidden
  # reasoning tokens before any visible text, especially at higher effort).
  max_output_tokens: 150
  timeout_s: 20
  max_tool_rounds: 4        # cap tool-call rounds per turn (no infinite loops)
  max_history_turns: 20     # rolling conversation memory, kept locally

ojn:
  # Self-hosted OpenJabNab on the Bolt: the Apache wrapper on port 80.
  # NEVER :8080 — that port speaks OJN's internal binary framing, not HTTP
  # (docs/OJN_API_NOTES.md §1).
  base_url: http://127.0.0.1
  # OJN_TOKEN comes from .env, not from here

audio:
  # reSpeaker Flex XVF3800 (hardware-verified on the Bolt, July 2026): ALSA
  # card "C16K6Ch", 16 kHz / 6 channels; channel 0 is by far the loudest and
  # clearest, so capture all 6 and select it. Always use the STABLE card name
  # (hw:CARD=...), never the numeric index — card numbers change across reboots.
  # (Interim fallback, mono webcam: plughw:CARD=PCLM1E,DEV=0 with channels: 1.)
  # Note: sounddevice/PortAudio does not take arbitrary ALSA PCM strings the
  # way arecord does — the brain extracts the card token (C16K6Ch) and
  # resolves the PortAudio device index dynamically at start. If that ever
  # mismatches, pin the index explicitly with capture_device_index.
  capture_device: "hw:CARD=C16K6Ch,DEV=0"
  # capture_device_index: 3   # optional: explicit PortAudio index override
  sample_rate: 16000
  channels: 6
  selected_channel: 0
  # Keep a natural mid-sentence pause open; 700 ms proved too eager on the
  # real microphone and forced a new wake word after a brief hesitation.
  vad_end_of_speech_ms: 1600
  half_duplex_guard_ms: 300
  # capture_queue_blocks: 300   # ~9.6s @ 32ms/block (default). Bump if
  #   "capture queue full, dropping blocks" still appears under real load —
  #   memory cost is trivial (~6 KB/block, raw 6ch).

leds:
  # LISTENING is a five-LED magenta breathing effect with counter-rotating
  # ears. It stops at VAD end-of-speech. PROCESSING (pulsing orange while the
  # agent thinks) is opt-in.
  processing_indicator: false

wake_beep:
  # Short confirmation sound played ON THE RABBIT (so the user hears it from
  # the Nabaztag, not the Bolt). It rides the audio lane, so the half-duplex
  # gate keeps it out of VAD/STT (no AEC) — no fixed guard needed. Off by
  # default; before enabling on hardware confirm Silero does not classify the
  # tone as speech and it never leaks into a transcript.
  # NOTE (hardware, July 2026): a ~120 ms/1 KB MP3 fetched fine (GET 200) but
  # was inaudible — likely too short for the MTL decoder; use ~200-300 ms. A
  # firmware-resident tone is NOT remotely triggerable (docs/OJN_API_NOTES #11),
  # so an external MP3 is the only controllable wake sound. The wake file is
  # kept out of the retention purge (Mp3Server protected set).
  enabled: false
  mp3: www/audio/wake.mp3   # a ~200-300 ms MP3 the rabbit can fetch (served by mp3_server)
  duration_ms: 250

wake:
  # openWakeWord model names or paths. The stock hey_jarvis model is for the
  # initial smoke test ONLY — the target wake phrase is "Nabaztag", which
  # needs a custom model trained with openWakeWord's synthetic-data pipeline
  # (Apache-2.0; https://github.com/dscripka/openWakeWord — the trained
  # artifact is ours, record training provenance alongside the file).
  # Model weights are gitignored; keep them in models/wake/.
  models: [hey_jarvis]
  # models: [models/wake/nabaztag.onnx]
  threshold: 0.5

doa:
  # Direction-of-arrival via the XVF3800 USB control interface.
  # Hardware-confirmed on the Bolt (July 2026): USB 2886:001e, DOA_VALUE at
  # resid=20/cmd=18, one 5-byte transfer (status + DOA_VALUE.length) returns
  # [status, angle_low, angle_high, speech_detected, extra] — angle 0-359°
  # little-endian, speech flag byte. Works without sudo via the udev rule.
  # DoA is fail-open in every backend: a USB error never stops wake/VAD/STT.
  enabled: true
  # "flex" (default): our own PyUSB decoder for the verified layout above
  #   (rabbit_brain.audio.doa.FlexUsbDoa — license-clean, no vendor code:
  #   the respeaker/reSpeaker_Flex repo declares no license, so nothing from
  #   it is vendored into this Apache-2.0 tree).
  # "command": one-shot external tool, angle = last number in stdout. NOT for
  #   continuously-running scripts (respeaker_get_doa.py never exits → timeout).
  # "usb": generic XMOS device-control read (status + one 32-bit value) for
  #   other firmware builds; set doa.usb resid/cmd ids from its command map.
  backend: flex
  # flex:
  #   resid: 20       # DOA_VALUE resource id (verified)
  #   cmd: 18         # DOA_VALUE command id (verified)
  # command: "..."    # one-shot CLI, if backend: command
  # usb:
  #   resid: 0
  #   cmd_doa: 0
  #   cmd_speech: 0   # optional
  #   value_format: f # f = float32, i = int32

mp3_server:
  # Tiny HTTP server that serves TTS output to the rabbit (docs/ARCHITECTURE.md §5)
  host: 0.0.0.0     # must be reachable from the legacy segment
  port: 8090
  audio_dir: www/audio

events_listener:
  # Receives ojn-plugin-events webhooks (click/RFID). The OJN daemon runs with
  # host networking on the same box, so localhost is enough.
  host: 127.0.0.1
  port: 8091
