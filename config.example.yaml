# Copy to config.yaml (gitignored) and fill in for your setup.

# STT profile: "cloud" (Deepgram primary, OpenAI Whisper API fallback) or "local" (faster-whisper on CPU)
stt_profile: cloud

deepgram:
  # Pinned but swappable without code changes (docs/ARCHITECTURE.md §6.2.4)
  model: nova-3
  language: multi   # auto it/en

openai_whisper:
  model: whisper-1

local_whisper:
  # benchmark small vs medium int8 on the Bolt (task T5)
  model: small
  compute_type: int8

# TTS profile: "elevenlabs" (cloud, Italian voice) or "piper" (local)
tts_profile: elevenlabs

elevenlabs:
  voice_id: ""      # your Italian voice id
  model: eleven_multilingual_v2

llm:
  model: claude-sonnet-4-6
  max_history_turns: 20

ojn:
  # Self-hosted OpenJabNab on the Bolt (docs/ARCHITECTURE.md §6.1)
  base_url: http://127.0.0.1:8080
  # OJN_TOKEN comes from .env, not from here

audio:
  # reSpeaker Flex XVF3800 (hardware-verified on the Bolt, July 2026): ALSA
  # card "C16K6Ch", 16 kHz / 6 channels; channel 0 is by far the loudest and
  # clearest, so capture all 6 and select it. Always use the STABLE card name
  # (hw:CARD=...), never the numeric index — card numbers change across reboots.
  # (Interim fallback, mono webcam: plughw:CARD=PCLM1E,DEV=0 with channels: 1.)
  capture_device: "hw:CARD=C16K6Ch,DEV=0"
  sample_rate: 16000
  channels: 6
  selected_channel: 0
  vad_end_of_speech_ms: 700
  half_duplex_guard_ms: 300

wake:
  # openWakeWord model names or .onnx paths (openwakeword.utils.download_models)
  models: [hey_jarvis]
  threshold: 0.5

doa:
  # Direction-of-arrival via the XVF3800 USB control interface.
  # Hardware-verified on the Bolt (July 2026) with the official Flex host tool:
  # USB 2886:001e, SPEECH_DETECTED toggles, DOA_VALUE stable over 0-359°.
  enabled: true
  # "command": shell out to the official host-control tool (external dependency
  #   — the respeaker/reSpeaker_Flex repo declares no license, so its code is
  #   never vendored into this Apache-2.0 tree). The angle is parsed as the
  #   last number in stdout.
  # "usb": our own PyUSB client (rabbit_brain.audio.doa.XvfUsbDoa) — fill in
  #   doa.usb resid/cmd ids from the tool's command map and verify against the
  #   official tool before switching.
  # Either way DoA is fail-open: a USB error never stops wake/VAD/STT.
  backend: command
  command: "xvf_host GET_DOA_VALUE"          # adapt to the tool's actual CLI
  # speech_command: "xvf_host GET_SPEECH_DETECTED"   # optional
  # usb:
  #   resid: 0        # resource id from the firmware command map — VERIFY
  #   cmd_doa: 0      # DOA_VALUE command id — VERIFY
  #   cmd_speech: 0   # SPEECH_DETECTED command id — VERIFY (optional)
  #   value_format: f # f = float32, i = int32

mp3_server:
  # Tiny HTTP server that serves TTS output to the rabbit (docs/ARCHITECTURE.md §5)
  host: 0.0.0.0     # must be reachable from the legacy segment
  port: 8090
  audio_dir: www/audio

events_listener:
  # Receives ojn-plugin-events webhooks (click/RFID). The OJN daemon runs with
  # host networking on the same box, so localhost is enough.
  host: 127.0.0.1
  port: 8091
